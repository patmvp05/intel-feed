<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INTEL // Daily Briefing</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #07090f;
      --surface: #0d1117;
      --sur2:    #131820;
      --border:  #1e2730;
      --text:    #c8d6e5;
      --dim:     #4a6a8a;
      --bright:  #e8f4ff;
      --fox:     #cc2200;
      --dw:      #1a4a8a;
      --cfp:     #1a7a3a;
      --espn:    #c44a00;
      --tg:      #0088cc;
      --xtr:     #7c3aed;
      --tsl:     #00c8b4;
      --pin:     #f0a020;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; font-size: 13px; line-height: 1.55; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(7,9,15,.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .h-title { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: .18em; color: var(--bright); line-height: 1; }
    .h-title span { color: var(--xtr); }
    .h-right { display: flex; align-items: center; gap: 14px; }
    #last-updated { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); }
    #refresh-btn {
      background: var(--sur2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 15px; border-radius: 4px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .06em;
      transition: border-color .2s, color .2s;
    }
    #refresh-btn:hover { border-color: var(--tsl); color: var(--tsl); }
    #refresh-btn:disabled { opacity: .45; cursor: default; }

    /* LAYOUT */
    main { padding: 22px 24px; max-width: 1700px; margin: 0 auto; }

    /* PINNED */
    #pinned-section { display: none; margin-bottom: 30px; }
    #pinned-section.has-pins { display: block; }
    .section-label {
      font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: .22em;
      color: var(--pin); margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    #pinned-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 10px; }
    .pinned-card { background: var(--surface); border: 1px solid var(--pin); border-left: 3px solid var(--pin); border-radius: 6px; padding: 11px 13px; }
    .pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .pc-title { font-size: 12px; font-weight: 500; color: var(--bright); text-decoration: none; line-height: 1.4; }
    .pc-title:hover { text-decoration: underline; }
    .pc-acts { display: flex; gap: 5px; flex-shrink: 0; }
    .pc-upd { background: var(--sur2); border: 1px solid var(--border); color: var(--dim); padding: 2px 7px; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 9px; transition: all .15s; }
    .pc-upd:hover { border-color: var(--tsl); color: var(--tsl); }
    .pc-rm { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 1px 3px; transition: color .15s; }
    .pc-rm:hover { color: var(--fox); }
    .pc-meta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--dim); }
    .pc-note { margin-top: 7px; padding: 7px 9px; background: var(--sur2); border-left: 2px solid var(--pin); border-radius: 3px; font-size: 11px; color: var(--text); }

    /* GRID */
    .sources-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
    @media (max-width: 1150px) { .sources-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 700px)  { .sources-grid { grid-template-columns: 1fr; } main { padding: 14px; } }
    .tg-group { grid-column: 1 / -1; }
    .tg-inner { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    @media (max-width: 1150px) { .tg-inner { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 700px)  { .tg-inner { grid-template-columns: 1fr; } }

    /* CARD */
    .source-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .card-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: relative; }
    .card-header::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .card-name { font-family: 'Bebas Neue', cursive; font-size: 15px; letter-spacing: .1em; color: var(--bright); }
    .card-count { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--dim); }
    .story-list { padding: 4px 0; }

    .c-fox  .card-header::before { background: var(--fox);  }
    .c-dw   .card-header::before { background: var(--dw);   }
    .c-cfp  .card-header::before { background: var(--cfp);  }
    .c-espn .card-header::before { background: var(--espn); }
    .c-tg   .card-header::before { background: var(--tg);   }
    .c-xtr  .card-header::before { background: var(--xtr);  }
    .c-tsl  .card-header::before { background: var(--tsl);  }

    /* STORY ROW */
    .story-item { padding: 9px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 9px; transition: background .12s; }
    .story-item:last-child { border-bottom: none; }
    .story-item:hover { background: var(--sur2); }
    .story-body { flex: 1; min-width: 0; }
    .story-title { color: var(--bright); font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 2px; display: block; text-decoration: none; }
    .story-title:hover { text-decoration: underline; }
    .story-meta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--dim); }
    .pin-btn { background: none; border: none; color: var(--dim); cursor: pointer; padding: 1px 3px; font-size: 12px; border-radius: 3px; transition: color .12s; flex-shrink: 0; line-height: 1; }
    .pin-btn:hover { color: var(--pin); }
    .pin-btn.is-pinned { color: var(--pin); }

    /* TRENDING */
    .trend-item { padding: 7px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: background .12s; }
    .trend-item:last-child { border-bottom: none; }
    .trend-item:hover { background: var(--sur2); }
    .trend-rank { font-family: 'Bebas Neue', cursive; font-size: 17px; color: var(--xtr); opacity: .5; width: 20px; flex-shrink: 0; line-height: 1; }
    .trend-name { font-size: 12px; font-weight: 500; color: var(--bright); text-decoration: none; }
    .trend-name:hover { text-decoration: underline; }

    /* SKELETON */
    .skel-wrap { padding: 10px 14px; }
    .skel { background: linear-gradient(90deg, var(--sur2) 25%, var(--border) 50%, var(--sur2) 75%); background-size: 200% 100%; animation: shim 1.4s infinite; border-radius: 3px; height: 11px; margin-bottom: 7px; }
    .skel.w80 { width: 80%; } .skel.w55 { width: 55%; }
    @keyframes shim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .err-msg { padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); text-align: center; }
    .err-msg a { color: var(--dim); }
  </style>
</head>
<body>
<header>
  <div class="h-title">INTEL <span>//</span> DAILY BRIEFING</div>
  <div class="h-right">
    <span id="last-updated">—</span>
    <button id="refresh-btn" onclick="loadAll()">↺ REFRESH</button>
  </div>
</header>
<main>
  <section id="pinned-section">
    <div class="section-label">📌 TRACKING</div>
    <div id="pinned-list"></div>
  </section>

  <div class="sources-grid">
    <div class="source-card c-fox" style="animation-delay:.04s">
      <div class="card-header"><span class="card-name">🦊 Fox News</span><span class="card-count" id="ct-fox">—</span></div>
      <div class="story-list" id="sl-fox"></div>
    </div>
    <div class="source-card c-dw" style="animation-delay:.08s">
      <div class="card-header"><span class="card-name">📰 Daily Wire</span><span class="card-count" id="ct-dw">—</span></div>
      <div class="story-list" id="sl-dw"></div>
    </div>
    <div class="source-card c-cfp" style="animation-delay:.12s">
      <div class="card-header"><span class="card-name">🗽 Citizens Free Press</span><span class="card-count" id="ct-cfp">—</span></div>
      <div class="story-list" id="sl-cfp"></div>
    </div>
    <div class="source-card c-espn" style="animation-delay:.16s">
      <div class="card-header"><span class="card-name">🏆 ESPN</span><span class="card-count" id="ct-espn">—</span></div>
      <div class="story-list" id="sl-espn"></div>
    </div>
    <div class="source-card c-xtr" style="animation-delay:.20s">
      <div class="card-header"><span class="card-name">𝕏 Trending USA</span><span class="card-count" id="ct-xtr">—</span></div>
      <div class="story-list" id="sl-xtr"></div>
    </div>
    <div class="source-card c-tsl" style="animation-delay:.24s">
      <div class="card-header"><span class="card-name">⚡ Teslatsri</span><span class="card-count" id="ct-tsl">—</span></div>
      <div class="story-list" id="sl-tsl"></div>
    </div>

    <div class="tg-group" style="animation-delay:.28s">
      <div class="section-label">✈️ TELEGRAM INTEL</div>
      <div class="tg-inner">
        <div class="source-card c-tg">
          <div class="card-header"><span class="card-name">🔭 Behold Israel</span><span class="card-count" id="ct-bi">—</span></div>
          <div class="story-list" id="sl-bi"></div>
        </div>
        <div class="source-card c-tg">
          <div class="card-header"><span class="card-name">📡 Amit Segal</span><span class="card-count" id="ct-amit">—</span></div>
          <div class="story-list" id="sl-amit"></div>
        </div>
        <div class="source-card c-tg">
          <div class="card-header"><span class="card-name">🇮🇱 Israel Today</span><span class="card-count" id="ct-il">—</span></div>
          <div class="story-list" id="sl-il"></div>
        </div>
        <div class="source-card c-tg">
          <div class="card-header"><span class="card-name">💬 Pavel Durov</span><span class="card-count" id="ct-durov">—</span></div>
          <div class="story-list" id="sl-durov"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── UTILS ──────────────────────────────────────────────────────
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function relDate(str){
  if(!str) return '';
  try{
    const d=new Date(str), now=new Date(), m=Math.floor((now-d)/60000);
    if(isNaN(d.getTime())) return '';
    if(m<1) return 'just now';
    if(m<60) return m+'m ago';
    if(m<1440) return Math.floor(m/60)+'h ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch{ return ''; }
}

function skel(n=5){
  return '<div class="skel-wrap">'+Array.from({length:n},()=>
    '<div class="skel w80"></div><div class="skel w55" style="margin-bottom:13px"></div>').join('')+'</div>';
}

// ── FETCH HELPERS ──────────────────────────────────────────────
// For RSS: use rss2json.com (free, handles CORS, no key needed for public feeds)
async function fetchRSS2JSON(feedUrl){
  const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&count=6`;
  try{
    const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
    const d = await r.json();
    if(d.status === 'ok') return d.items||[];
    return [];
  }catch{ return []; }
}

// For HTML pages (Telegram): try multiple CORS proxies
async function fetchHTML(url){
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
  ];
  for(const proxy of proxies){
    try{
      const r = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
      if(r.ok){
        const text = await r.text();
        if(text && text.length > 100) return text;
      }
    }catch{}
  }
  return null;
}

// ── PINNED ─────────────────────────────────────────────────────
let pins = JSON.parse(localStorage.getItem('pins')||'[]');
function savePin(){ localStorage.setItem('pins',JSON.stringify(pins)); }

function pinStory(story){
  if(!pins.find(s=>s.link===story.link)){ pins.unshift(story); savePin(); renderPins(); }
}
function unpin(link){ pins=pins.filter(s=>s.link!==link); savePin(); renderPins(); }
function updatePin(link){
  const p=pins.find(s=>s.link===link);
  if(!p) return;
  p.note='Last checked: '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+' — tap title for latest.';
  savePin(); renderPins();
}

function renderPins(){
  const sec=document.getElementById('pinned-section');
  const lst=document.getElementById('pinned-list');
  if(!pins.length){ sec.classList.remove('has-pins'); return; }
  sec.classList.add('has-pins');
  lst.innerHTML=pins.map(p=>`
    <div class="pinned-card" id="pc-${btoa(encodeURIComponent(p.link)).replace(/\W/g,'')}">
      <div class="pc-top">
        <a class="pc-title" href="${esc(p.link)}" target="_blank">${esc(p.title)}</a>
        <div class="pc-acts">
          <button class="pc-upd" data-link="${esc(p.link)}">↺ UPDATE</button>
          <button class="pc-rm"  data-link="${esc(p.link)}">✕</button>
        </div>
      </div>
      <div class="pc-meta">${esc(p.source)}${p.date?' · '+esc(p.date):''}</div>
      ${p.note?`<div class="pc-note">${esc(p.note)}</div>`:''}
    </div>`).join('');
  lst.querySelectorAll('.pc-rm').forEach(b=>b.addEventListener('click',()=>unpin(b.dataset.link)));
  lst.querySelectorAll('.pc-upd').forEach(b=>b.addEventListener('click',()=>updatePin(b.dataset.link)));
}

// ── RENDER ─────────────────────────────────────────────────────
function renderStories(slId, ctId, stories, fallbackUrl){
  const sl=document.getElementById(slId), ct=document.getElementById(ctId);
  if(!sl) return;
  if(!stories?.length){
    sl.innerHTML=`<div class="err-msg">Couldn't load · <a href="${esc(fallbackUrl||'#')}" target="_blank">open directly ↗</a></div>`;
    if(ct) ct.textContent='—'; return;
  }
  if(ct) ct.textContent=stories.length+' items';
  sl.innerHTML=stories.map(s=>`
    <div class="story-item">
      <div class="story-body">
        <a class="story-title" href="${esc(s.link)}" target="_blank">${esc(s.title)}</a>
        ${s.date?`<div class="story-meta">${esc(s.date)}</div>`:''}
      </div>
      <button class="pin-btn" data-title="${esc(s.title)}" data-link="${esc(s.link)}" data-source="${esc(s.source)}" data-date="${esc(s.date||'')}">📌</button>
    </div>`).join('');
  sl.querySelectorAll('.pin-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      pinStory({title:b.dataset.title,link:b.dataset.link,source:b.dataset.source,date:b.dataset.date});
      b.classList.add('is-pinned');
    });
  });
}

function renderTrending(items){
  const sl=document.getElementById('sl-xtr'), ct=document.getElementById('ct-xtr');
  if(!items?.length){ sl.innerHTML='<div class="err-msg">Couldn\'t load trends</div>'; ct.textContent='—'; return; }
  ct.textContent=items.length+' topics';
  sl.innerHTML=items.map((t,i)=>`
    <div class="trend-item">
      <span class="trend-rank">${i+1}</span>
      <a class="trend-name" href="${esc(t.link)}" target="_blank">${esc(t.name)}</a>
    </div>`).join('');
}

// ── LOADERS ────────────────────────────────────────────────────
async function loadRSS(slId, ctId, feedUrl, source){
  document.getElementById(slId).innerHTML=skel();
  const items = await fetchRSS2JSON(feedUrl);
  const stories = items.map(i=>({
    title: i.title?.replace(/<[^>]+>/g,'').trim()||'',
    link:  i.link||i.guid||'',
    date:  relDate(i.pubDate),
    source
  })).filter(s=>s.title&&s.link);
  renderStories(slId, ctId, stories, feedUrl);
}

async function loadTelegram(slId, ctId, channel, source){
  document.getElementById(slId).innerHTML=skel();
  const html = await fetchHTML(`https://t.me/s/${channel}`);
  if(!html){ renderStories(slId, ctId, [], `https://t.me/s/${channel}`); return; }
  const doc = new DOMParser().parseFromString(html,'text/html');
  const wraps = Array.from(doc.querySelectorAll('.tgme_widget_message_wrap')).slice(-6).reverse();
  const stories = wraps.map(w=>{
    const textEl=w.querySelector('.tgme_widget_message_text');
    const dateEl=w.querySelector('.tgme_widget_message_date a');
    const timeEl=w.querySelector('time');
    if(!textEl) return null;
    const text=textEl.textContent?.trim()||'';
    return text.length>5 ? {
      title: text.length>130 ? text.slice(0,130)+'…' : text,
      link:  dateEl?.href||`https://t.me/s/${channel}`,
      date:  relDate(timeEl?.getAttribute('datetime')||''),
      source
    } : null;
  }).filter(Boolean);
  renderStories(slId, ctId, stories, `https://t.me/s/${channel}`);
}

async function loadTrending(){
  document.getElementById('sl-xtr').innerHTML=skel(10);
  const html = await fetchHTML('https://trends24.in/united-states/');
  if(!html){ document.getElementById('sl-xtr').innerHTML='<div class="err-msg">Couldn\'t load</div>'; return; }
  const doc=new DOMParser().parseFromString(html,'text/html');
  const els=doc.querySelectorAll('.trend-card__list li a, ol li a');
  const seen=new Set(), items=[];
  for(const el of els){
    const name=el.textContent.trim();
    if(name&&!seen.has(name)){ seen.add(name); items.push({name,link:`https://x.com/search?q=${encodeURIComponent(name)}&src=trend_click`}); }
    if(items.length>=10) break;
  }
  renderTrending(items);
}

async function loadTeslatsri(){
  document.getElementById('sl-tsl').innerHTML=skel();
  // Try nitter instances for RSS
  const instances=['https://nitter.privacydev.net','https://nitter.poast.org','https://nitter.cz'];
  for(const base of instances){
    const items = await fetchRSS2JSON(`${base}/Teslatsri/rss`);
    if(items.length){
      const stories=items.map(i=>({title:i.title?.replace(/<[^>]+>/g,'').trim()||'',link:i.link||'',date:relDate(i.pubDate),source:'@Teslatsri'})).filter(s=>s.title&&s.link);
      if(stories.length){ renderStories('sl-tsl','ct-tsl',stories,'https://x.com/Teslatsri'); return; }
    }
  }
  // Fallback direct link
  document.getElementById('sl-tsl').innerHTML=`<div class="story-item"><div class="story-body">
    <a class="story-title" href="https://x.com/Teslatsri" target="_blank">Open @Teslatsri on X ↗</a>
    <div class="story-meta">X API unavailable on free tier</div>
  </div></div>`;
  document.getElementById('ct-tsl').textContent='direct link';
}

// ── LOAD ALL ───────────────────────────────────────────────────
async function loadAll(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true; btn.textContent='↺ Loading…';
  document.getElementById('last-updated').textContent='Updating…';

  await Promise.allSettled([
    loadRSS('sl-fox','ct-fox','https://feeds.foxnews.com/foxnews/latest','Fox News'),
    loadRSS('sl-dw','ct-dw','https://www.dailywire.com/feeds/rss.xml','Daily Wire'),
    loadRSS('sl-cfp','ct-cfp','https://citizensfreepresss.com/feed/','Citizens Free Press'),
    loadRSS('sl-espn','ct-espn','https://www.espn.com/espn/rss/news','ESPN'),
    loadTrending(),
    loadTeslatsri(),
    loadTelegram('sl-bi','ct-bi','beholdisraelchannel','Behold Israel'),
    loadTelegram('sl-amit','ct-amit','amitseg','Amit Segal'),
    loadTelegram('sl-il','ct-il','ILtoday','Israel Today'),
    loadTelegram('sl-durov','ct-durov','durov','Pavel Durov'),
  ]);

  const t=new Date();
  document.getElementById('last-updated').textContent='Updated '+t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  btn.disabled=false; btn.textContent='↺ REFRESH';
}

renderPins();
loadAll();
</script>
</body>
</html>
